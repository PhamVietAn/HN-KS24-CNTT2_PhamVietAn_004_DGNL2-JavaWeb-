<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${part.id} ? 'Sửa Linh kiện' : 'Thêm Linh kiện'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Quản lý Linh kiện Bàn phím</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Danh sách Linh kiện</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/categories">Danh mục</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4" th:text="${part.id} ? 'Sửa Linh kiện' : 'Thêm Linh kiện Mới'"></h1>

                <div class="card">
                    <div class="card-body">
                        <form th:action="${part.id} ? @{'/parts/update/' + ${part.id}} : @{'/parts/save'}"
                              method="post" enctype="multipart/form-data" th:object="${part}">

                            <div class="mb-3">
                                <label for="partName" class="form-label">Tên linh kiện <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('partName')} ? 'is-invalid'"
                                       id="partName" th:field="*{partName}" placeholder="Nhập tên linh kiện">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('partName')}">
                                    <span th:errors="*{partName}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="manufacturer" class="form-label">Nhà sản xuất <span class="text-danger">*</span></label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('manufacturer')} ? 'is-invalid'"
                                       id="manufacturer" th:field="*{manufacturer}" placeholder="Nhập tên nhà sản xuất">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('manufacturer')}">
                                    <span th:errors="*{manufacturer}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="price" class="form-label">Giá (USD) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                       id="price" th:field="*{price}" placeholder="0.00" step="0.01" min="0">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}">
                                    <span th:errors="*{price}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="releaseDate" class="form-label">Ngày phát hành <span class="text-danger">*</span></label>
                                <input type="date" class="form-control"
                                       th:classappend="${#fields.hasErrors('releaseDate')} ? 'is-invalid'"
                                       id="releaseDate" th:field="*{releaseDate}">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('releaseDate')}">
                                    <span th:errors="*{releaseDate}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="category" class="form-label">Danh mục <span class="text-danger">*</span></label>
                                <select class="form-select"
                                        th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                                        id="category" th:field="*{category}">
                                    <option value="">-- Chọn danh mục --</option>
                                    <option th:each="category : ${categories}"
                                            th:value="${category.id}"
                                            th:text="${category.name}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('category')}">
                                    <span th:errors="*{category}"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="partImage" class="form-label">Hình ảnh linh kiện</label>
                                <input type="file" class="form-control"
                                       id="partImage" name="file" accept="image/*">
                                <small class="form-text text-muted">Tối đa 10MB. Định dạng: JPG, PNG, GIF</small>
                                <div th:if="${part.partImage}" class="mt-2">
                                    <img th:src="@{'/uploads/' + ${part.partImage}}"
                                         alt="Current Image" class="img-thumbnail" style="width: 150px;">
                                    <p class="text-muted mt-2">Ảnh hiện tại</p>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="inStock" class="form-label">Tình trạng hàng</label>
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           id="inStock" th:field="*{inStock}">
                                    <label class="form-check-label" for="inStock">
                                        Còn hàng
                                    </label>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <span th:if="${part.id}">Cập nhật</span>
                                    <span th:unless="${part.id}">Thêm mới</span>
                                </button>
                                <a href="/" class="btn btn-secondary">Hủy</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 Quản lý Linh kiện Bàn phím - Mechanical Keyboard Management</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
