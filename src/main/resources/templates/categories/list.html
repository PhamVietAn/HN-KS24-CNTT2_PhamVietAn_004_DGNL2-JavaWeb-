<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Danh mục</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Quản lý Linh kiện Bàn phím</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Danh sách Linh kiện</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/categories">Danh mục</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Danh sách Danh mục Linh kiện</h1>
            <a href="/categories/add" class="btn btn-primary">Thêm Danh mục</a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Tên danh mục</th>
                        <th>Mô tả</th>
                        <th class="text-center">Số linh kiện</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="category : ${categories}">
                        <td th:text="${category.id}"></td>
                        <td th:text="${category.name}"></td>
                        <td th:text="${category.description}"></td>
                        <td class="text-center">
                            <span class="badge bg-info text-center" th:text="${category.keyboardParts != null ? category.keyboardParts.size() : 0}"></span>
                        </td>
                        <td>
                            <a th:href="@{'/categories/edit/' + ${category.id}}" class="btn btn-sm btn-warning">Sửa</a>
                            <a th:href="@{'/categories/delete/' + ${category.id}}" class="btn btn-sm btn-danger"
                               onclick="return confirm('Bạn có chắc muốn xóa danh mục này? Tất cả linh kiện trong danh mục cũng sẽ bị xóa!')">Xóa</a>
                        </td>
                    </tr>
                    <tr th:if="${categories.isEmpty()}">
                        <td colspan="5" class="text-center text-muted">Không có danh mục nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2026 Quản lý Linh kiện Bàn phím - Mechanical Keyboard Management</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
